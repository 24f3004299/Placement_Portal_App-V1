<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>Go back</button>
    <form method="Post">
        
        <select name="filter" id="filter" placeholder="enter"> 
            <option name="All" disabled selected >Filter</option>
            <option name="All" >All</option>
            <option name="History">History</option>
            <option name="Active">Active </option>
            <option name="Pending">Pending</option>
            <option name="Rejected">Rejected</option>

        </select>
        <input type="submit" value="GO">
    </form>
    <table>
        <th><tr>Drive Name</tr> <tr>Details</tr> <tr>Status</tr></tr>
        {%for job in jobs%}
            <tr> <td>{{job["drive_name"]}}</td><td><button>Job description</button></td><td>{{job["status"]}}</td></tr>
        {%else%}
             <center> Not Found</center>
        {%endfor%}
    </table>
    
</body>
</html>
