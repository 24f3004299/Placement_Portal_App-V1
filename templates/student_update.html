<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <button> View current details</button>
    <a href={{url_for('student.student',idi=idi)}}><button>Home</button></a>
     <div  class="card" style="width:80%; margin:10%; padding:5%">
      <h5 class="card-title">About</h5>
      <form method="post" enctype="multipart/form-data" >
      <label for="name">Full Name</label>
      <input type="text" name="name" id="name"><br>
      <label for="dob">Date of Birth</label>
      <input type="date" name="dob" id="dob"><br>
      <label for="cont">Contact Number</label>
      <input type="tel" name="cont" id="cont" placeholder="+91"><br>
      <label for="qly">Higher Qualification</label>
      <select name="qly" id="qly">

        <option value="Ug - pursuing">Undergraduate/(Ug-pursuing)</option>
        <option value="Graduate">Graduate</option>
        <option value="Pg">Pursuing /Completed PG,Masters,Phd/others</option>
        </select><br>
      <label for="dept">
      Department/Major:
      </label>
      <input type="text" name="dept" id="dept"><br>
      <label for="nation">Nationality</label>
      <input name="nation" id="nation" type="text" placeholder="Indian"><br>
      <label for="state">State</label>
      <input name="state" id="state" type="text"><br>
      <label for="area">Location:-</label>
      <input name="area" id="area" type="text"><br>
      <label for="resume">Upload Resume</label>
      <input type="file" id="resume" name="resume" placeholder="Upload- gdrive link"><br>
      <input type="Submit" value="Update" class="btn btn-success">
    </form></div>

    
</body>
</html>
