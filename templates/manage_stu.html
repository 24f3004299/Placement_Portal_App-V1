{%extends "root.html"%}
<html>
    <body>
        
{%block header%}
 {{super()}}
{%endblock%}
{%block nav%}
 <input type="search" placeholder="search by name/id/contact">
{%endblock%}
{%block body%}
<a href={{url_for('admin.admin')}}><button> Back </button></a>
<table class="table table-hover">
    <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">Contact</th>
            <th scope="col">Action</th>
        </tr>

    </thead>
    <tbody>
        {%for a in all%}
        <tr scope="row">
            <td>
               {{ a["ID"]}}
            </td>
            <td>
                {{a["Name"]}}
            </td>

            <td>
                {{a["contact"]}}
            </td>
            <td>
            <button>Blacklist</button>
            </td>


        </tr>
        {%else%}
        Not Found
        {%endfor%}
       


    </tbody>
</table>
{%endblock%}



{%block footer%}
 {{super()}}
{%endblock%}



</body>
</html>
